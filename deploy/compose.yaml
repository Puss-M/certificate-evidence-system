name: certificate-evidence

services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: certificate_evidence
      MYSQL_USER: certificate
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - app

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    restart: unless-stopped
    environment:
      APP_ENV: production
      DATABASE_URL: mysql+pymysql://certificate:${MYSQL_PASSWORD}@db:3306/certificate_evidence
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      AUTH_ACCESS_TOKEN_MINUTES: ${AUTH_ACCESS_TOKEN_MINUTES:-120}
      PUBLIC_VERIFY_BASE_URL: ${PUBLIC_VERIFY_BASE_URL:?PUBLIC_VERIFY_BASE_URL is required}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data/outputs:/workspace/outputs
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/db', timeout=3)"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - app

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
      args:
        VITE_API_BASE_URL: /api
        VITE_USE_MOCK: "false"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - 127.0.0.1:${APP_PORT:-18080}:80
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/__health | grep -q '^ok$'"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - app

volumes:
  mysql_data:

networks:
  app:
    driver: bridge
